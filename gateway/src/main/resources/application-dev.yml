server:
  port: 8888  # 网关端口
path:
  prefix: gateway

spring:
  cloud:
    gateway:
      # 路由配置
      routes:
        # 用户服务路由
        - id: user-service
          uri: lb://user-service  # lb:// 表示从Nacos负载均衡
          predicates:
            - Path=/${path.prefix}/user/**  # 匹配 /user/** 的请求
          filters:
            - StripPrefix=1   # 去掉第一级路径（去掉/user）

        # 订单服务路由
        - id: order-service
          uri: lb://order-service
          predicates:
            - Path=/${path.prefix}/order/**
          filters:
            - StripPrefix=1

      # 跨域配置（很重要！）
      globalcors:
        cors-configurations:
          '[/**]':
            allowed-origin-patterns: "*"
            allowed-methods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowed-headers: "*"
            allow-credentials: true
            max-age: 3600

# 日志配置（调试用）
logging:
  level:
    org.springframework.cloud.gateway: trace
    com.alibaba.nacos: info