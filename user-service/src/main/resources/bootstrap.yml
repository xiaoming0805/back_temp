spring:
  application:
    name: user-service

  cloud:
    nacos:
      discovery:
        server-addr: 10.130.40.247:8848
        namespace: public  # 如果需要命名空间就填，不需要就删除这行
        group: DEFAULT_GROUP
      config:
        server-addr: 10.130.40.247:8848
        namespace: public
        group: DEFAULT_GROUP
        file-extension: yaml

  profiles:
    active: dev

  # 关键：加上这行，告诉 Spring 从 Nacos 拉取配置
  config:
    import:
      - optional:nacos:${spring.application.name}-${spring.profiles.active}.yaml?group=${spring.cloud.nacos.config.group}